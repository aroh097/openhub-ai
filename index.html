<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Hub AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

  <nav class="p-4 bg-gray-800 text-center text-xl font-bold">
    🚀 Open Hub AI
  </nav>

  <div class="flex flex-col items-center mt-10 px-4">
    <div class="w-full max-w-xl">
      
      <div id="chatBox" class="bg-gray-800 p-4 rounded h-80 overflow-y-auto mb-4"></div>

      <textarea id="userInput" class="w-full p-3 rounded bg-gray-700" rows="2" placeholder="Ask anything..."></textarea>
      
      <button onclick="sendMessage()" class="mt-3 w-full bg-blue-600 p-3 rounded">Send</button>

    </div>
  </div>

  <script>
    async function sendMessage() {
      let input = document.getElementById("userInput").value;
      let chatBox = document.getElementById("chatBox");

      chatBox.innerHTML += `<p><b>You:</b> ${input}</p>`;

      let res = await fetch("https://openhub-ai.onrender.com/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: input })
      });

      let data = await res.json();

      chatBox.innerHTML += `<p class='text-green-400'><b>AI:</b> ${data.reply}</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      document.getElementById("userInput").value = "";
    }
  </script>

</body>
</html>
